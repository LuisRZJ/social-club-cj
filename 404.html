<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FFD1A9">
  <title>Error 404 | CGN</title>

  <!-- CSS Modulares de la plataforma -->
  <link rel="stylesheet" href="/HECKS-BOT/estilos.css">
  <link rel="stylesheet" href="/pwa/estilos.css">
  <link rel="stylesheet" href="/pwa/temas.css">
  <link rel="stylesheet" href="/pwa/componentes.css">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="icon" type="image/png" href="/icons/Logo-CGN.avif">

  <!-- Script bloqueante ultraligero para aplicar tema de inmediato (sin flash blanco) -->
  <script>
    (function () {
      try {
        const temaGlobal = localStorage.getItem('preferencia-tema');
        const root = document.documentElement;
        if (temaGlobal === 'oscuro') {
          root.setAttribute('data-theme', 'dark');
        } else if (temaGlobal === 'automatico' || !temaGlobal) {
          const hora = new Date().getHours();
          const prefiereOscuro = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (hora >= 20 || hora < 7 || prefiereOscuro) {
            root.setAttribute('data-theme', 'dark');
          }
        }
      } catch (e) {
        console.error('Error al aplicar tema en 404', e);
      }
    })();
  </script>
</head>

<body class="text-gray-800">

  <!-- Overlay de carga -->
  <div class="loading-overlay" id="loadingOverlay">
    <div style="position: relative;">
      <div class="loading-spinner"></div>
      <div class="loading-text" id="loadingText">Cargando scripts...</div>
    </div>
    <div class="loading-version">V3</div>
  </div>

  <!-- Contenedor principal -->
  <div class="main-content" id="mainContent">

    <!-- COMPONENTE HEADER -->
    <div data-include="/componentes/header.html"></div>

    <div class="error-container" style="margin-top: 5rem; margin-bottom: 5rem;">
      <div class="error-code">404</div>
      <div class="error-message">Página no encontrada</div>
      <div class="error-description">
        Lo sentimos, la página que buscas no existe o ha sido movida.<br>
        Por favor, verifica la URL o utiliza los botones de abajo para continuar navegando.
      </div>
      <div class="error-nav-buttons">
        <a href="/index.html" class="error-nav-button"><i class="fas fa-home"></i> Ir al inicio</a>
        <a href="/categorias.html" class="error-nav-button"><i class="fas fa-list"></i> Ver categorías</a>
        <a href="/contacto.html" class="error-nav-button"><i class="fas fa-envelope"></i> Contactar soporte</a>
      </div>
    </div>

    <!-- COMPONENTE FOOTER -->
    <div data-include="/componentes/footer.html"></div>

    <!-- COMPONENTE FIXED BAR -->
    <div data-include="/componentes/bottom-bar.html"></div>

    <!-- COMPONENTE PANEL EXPANSION -->

    <!-- COMPONENTE CHAT OVERLAY -->

  </div> <!-- Cierre del main-content -->

  <!-- COMPONENTE THEME HELP -->

  </noscript>

  <!-- SCRIPT CARGADOR DE COMPONENTES MODULARES -->

  <!-- SCRIPT DE NOTICIAS -->
  <script src="/pwa/noticias.js"></script>
  <!-- SCRIPT DE PANTALLA CARGA -->
  <script src="/pwa/javascript.js"></script>

</body>

</html>
