/* Evitar desbordamiento de nombres de archivos largos */
#zipResult li.flex .flex-1 {

  font-size: 0.95em;
  overflow-wrap: break-word;

  max-width: 100%;

}
#summaryCard:hover {
  box-shadow: 0 6px 16px rgba(255, 176, 122, 0.15);
  border-color: #ffb07a;
}

    <!-- NUEVO: Subida y extracción de ZIP -->

      <label for="zipInput" class="flex flex-col items-center justify-center w-full max-w-xs p-6 bg-orange-50 border-2 border-dashed border-orange-300 rounded-xl cursor-pointer hover:bg-orange-100 transition shadow">

        <span class="text-xs text-gray-400 mt-1">Puedes seleccionar varios archivos .zip</span>

      <!-- Tarjeta de Resumen de Archivos Extraídos -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
      document.addEventListener('componentesCargados', function() {
      const zipInput = document.getElementById('zipInput');
      const extractBtn = document.getElementById('extractBtn');
      const clearBtn = document.getElementById('clearBtn');
      const zipResult = document.getElementById('zipResult');
      const zipLabelText = document.getElementById('zipLabelText');
      let zipFiles = [];
      let totalExtractedFiles = 0;
      let allExtractedFiles = [];
      const generalFileCount = document.getElementById('generalFileCount');
      const generalFileCountNumber = document.getElementById('generalFileCountNumber');
      const downloadAllBtn = document.getElementById('downloadAllBtn');
      const generalFileCountNumberText = document.getElementById('generalFileCountNumberText');
      function updateGeneralFileCount() {
        generalFileCountNumber.textContent = totalExtractedFiles;
        if (totalExtractedFiles > 0) {
          generalFileCountNumberText.style.display = 'inline';
        } else {
          generalFileCountNumberText.style.display = 'none';
        }
      }
      function updateDownloadAllBtnVisibility() {
        if (allExtractedFiles.length > 0) {
          downloadAllBtn.style.display = 'flex';
        } else {
          downloadAllBtn.style.display = 'none';
        }
      }

      // Permitir arrastrar y soltar sobre el label
      const zipLabel = document.querySelector('label[for="zipInput"]');
      zipLabel.addEventListener('dragover', function(e) {
        e.preventDefault();
        zipLabel.classList.add('bg-orange-200');
      });
      zipLabel.addEventListener('dragleave', function(e) {
        e.preventDefault();
        zipLabel.classList.remove('bg-orange-200');
      });
      zipLabel.addEventListener('drop', function(e) {
        e.preventDefault();
        zipLabel.classList.remove('bg-orange-200');
        if (e.dataTransfer.files.length > 0) {
          zipInput.files = e.dataTransfer.files;
          zipInput.dispatchEvent(new Event('change'));
        }
      });

      zipInput.addEventListener('change', function(e) {
        zipFiles = Array.from(e.target.files);
        extractBtn.disabled = zipFiles.length === 0;
        clearBtn.disabled = zipFiles.length === 0;
        if (zipFiles.length === 0) {
          zipLabelText.textContent = 'Selecciona uno o varios archivos ZIP';
        } else if (zipFiles.length === 1) {
          zipLabelText.textContent = `Archivo seleccionado: ${zipFiles[0].name}`;
        } else {
          zipLabelText.textContent = `${zipFiles.length} archivos ZIP seleccionados`;
        }
      });

      clearBtn.addEventListener('click', function() {
        zipInput.value = '';
        zipFiles = [];
        extractBtn.disabled = true;
        clearBtn.disabled = true;
        zipLabelText.textContent = 'Selecciona uno o varios archivos ZIP';
        zipResult.innerHTML = '';
        totalExtractedFiles = 0;
        allExtractedFiles = [];
        updateGeneralFileCount();
        downloadAllBtn.disabled = true;
        updateDownloadAllBtnVisibility();
      });

      extractBtn.addEventListener('click', async function() {
        if (zipFiles.length === 0) return;
        zipResult.innerHTML = '';
        totalExtractedFiles = 0; // Reinicia el contador antes de extraer
        allExtractedFiles = []; // Reinicia el arreglo global
        for (const zipFile of zipFiles) {
          const block = document.createElement('div');
          block.className = 'zip-block';
          let html = `<div class='flex items-center justify-between flex-wrap gap-2 mb-2'>
            <h3 class='flex items-center gap-2'><i class='fas fa-file-archive'></i>Archivo ZIP: ${zipFile.name}</h3>
            <div class='flex items-center gap-2'>
              <span class='archivo-count bg-orange-200 text-orange-800 font-semibold rounded-full px-3 py-1 text-xs shadow'>0 archivos</span>
              <button class='descargar-todo-btn bg-orange-400 hover:bg-orange-500 text-white font-semibold rounded-full px-3 py-1 text-xs shadow flex items-center gap-1' style='transition:background 0.2s;' disabled><i class='fas fa-download'></i> Descargar todo</button>
            </div>
          </div>`;
          try {
            html += '<div class="text-orange-500 font-semibold mb-2">Extrayendo archivos...</div>';
            block.innerHTML = html;
            zipResult.appendChild(block);
            const arrayBuffer = await zipFile.arrayBuffer();
            const zip = await JSZip.loadAsync(arrayBuffer);
            const files = Object.values(zip.files);
            const fileCount = files.filter(f => !f.dir).length;
            totalExtractedFiles += fileCount; // Suma al total
            updateGeneralFileCount(); // Actualiza el contador general
            // Guardar blobs y nombres para descarga múltiple
            const archivosParaDescargar = [];
            let filesHtml = '<ul class="space-y-3">';
            for (const file of files) {
              if (file.dir) continue;
              const blob = await file.async('blob');
              const url = URL.createObjectURL(blob);
              archivosParaDescargar.push({ name: file.name, blob });
              allExtractedFiles.push({ name: file.name, blob }); // Agrega al arreglo global
              filesHtml += `<li class="flex items-center gap-3 bg-white border border-orange-100 rounded p-2 shadow-sm">
                <i class="fas fa-file text-orange-400"></i>
                <span class="flex-1" style="min-width:0;">${file.name}</span>
                <a href="${url}" download="${file.name}" class="nav-button py-1 px-3 text-sm min-w-0" style="min-width:unset"><i class='fas fa-download'></i> Descargar</a>
              </li>`;
            }
            filesHtml += '</ul>';
            block.innerHTML = `<div class='flex items-center justify-between flex-wrap gap-2 mb-2'>
              <h3 class='flex items-center gap-2'><i class='fas fa-file-archive'></i>Archivo ZIP: ${zipFile.name}</h3>
              <div class='flex items-center gap-2'>
                <span class='archivo-count bg-orange-200 text-orange-800 font-semibold rounded-full px-3 py-1 text-xs shadow'>${fileCount} archivo${fileCount !== 1 ? 's' : ''}</span>
                <button class='descargar-todo-btn bg-orange-400 hover:bg-orange-500 text-white font-semibold rounded-full px-3 py-1 text-xs shadow flex items-center gap-1' style='transition:background 0.2s;' ${fileCount > 0 ? '' : 'disabled'}><i class='fas fa-download'></i> Descargar todo</button>
              </div>
            </div>` + filesHtml;
            // Asignar evento al botón de descarga múltiple
            block.querySelector('.descargar-todo-btn').addEventListener('click', async function() {
              for (const archivo of archivosParaDescargar) {
                const url = URL.createObjectURL(archivo.blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = archivo.name;
                a.style.display = 'none';
                document.body.appendChild(a);
                a.click();
                setTimeout(() => {
                  document.body.removeChild(a);
                  URL.revokeObjectURL(url);
                }, 100);
              }
            });
            block.querySelector('.descargar-todo-btn').title = 'Puede que tu navegador solicite permiso para descargar múltiples archivos.';
          } catch (err) {
            block.innerHTML = `<div class='flex items-center justify-between flex-wrap gap-2 mb-2'>
              <h3 class='flex items-center gap-2'><i class='fas fa-file-archive'></i>Archivo ZIP: ${zipFile.name}</h3>
              <div class='flex items-center gap-2'>
                <span class='archivo-count bg-orange-200 text-orange-800 font-semibold rounded-full px-3 py-1 text-xs shadow'>0 archivos</span>
                <button class='descargar-todo-btn bg-orange-400 text-white font-semibold rounded-full px-3 py-1 text-xs shadow flex items-center gap-1' disabled><i class='fas fa-download'></i> Descargar todo</button>
              </div>
            </div><div class='error'>Error al extraer el ZIP: ${err.message}</div>`;
          }
        }
        // Habilita o deshabilita el botón global de descarga múltiple
        downloadAllBtn.disabled = allExtractedFiles.length === 0;
        updateDownloadAllBtnVisibility();
      });
      // Evento para el botón Descargar Todo global
      downloadAllBtn.addEventListener('click', function() {
        for (const archivo of allExtractedFiles) {
          const url = URL.createObjectURL(archivo.blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = archivo.name;
          a.style.display = 'none';
          document.body.appendChild(a);
          a.click();
          setTimeout(() => {
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
          }, 100);
        }
      });
      // --- FIN: Función de extracción de ZIP múltiple ---

      });
    </script>
